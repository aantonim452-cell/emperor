name: Update List JSON

on:
  push:
    paths:
      - 'aplikasi/*.html'
    branches:
      - main

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate list.json
        run: |
          cd aplikasi
          echo '{ "apps": [' > list.json
          first=true
          for file in *.html; do
            if [ -f "$file" ]; then
              name=$(basename "$file" .html)
              if [ "$first" = true ]; then
                echo "    \"$name\"" >> list.json
                first=false
              else
                echo "    ,\"$name\"" >> list.json
              fi
            fi
          done
          echo '  ]' >> list.json
          echo '}' >> list.json
          cat list.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aplikasi/list.json
          git diff --staged --quiet || git commit -m "Auto update list.json"
          git push